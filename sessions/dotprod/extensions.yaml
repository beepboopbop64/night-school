schemaVersion: 1
session: dotprod
lanes:
  llm:
    - prompt: >-
        Tonight's meter is two arrows in, one number out, and you watched a
        candidate win purely by getting longer, not more aligned. Before
        you ask for help, propose your own cheapest fix: one change you'd
        make to how the candidate lists are compared so that stretching a
        candidate's length can never shout over a better-aligned one. Hand
        your fix to an LLM and ask it to stress-test it: what happens under
        your fix if a candidate doubles in length, and what happens if two
        candidates point in exactly the same direction but different
        lengths?
      whatGoodLooksLike: >-
        A good conversation pressure-tests your fix with concrete numbers
        rather than taking your word for it, and it should surface whether
        your fix actually stops length from moving the ranking or just
        hides the cheat somewhere else in the arithmetic.
    - prompt: >-
        Tonight's honest look proved that while every candidate held the
        same length, the score's sign alone told you aligned, perpendicular,
        or opposed. Argue with an LLM about how much of that guarantee
        survives once candidates are allowed to differ in length again: is
        the sign still trustworthy the moment lengths diverge, or does your
        fix from the first prompt have to be in place before the sign means
        anything?
      whatGoodLooksLike: >-
        A good answer separates what the sign tells you from what the raw
        size of the score tells you, and lands on a clear yes-or-no about
        whether sign alone survives unequal lengths, with a reason.
    - prompt: >-
        In the session's close, the probe list and candidate lists moved
        from songs to a job posting and the score kept working the same
        way. Pick a third aisle from your own life, anything you compare
        using a handful of features, and ask an LLM to help you write out
        what the probe list and candidate lists would look like there,
        and what a high, zero, and negative score would each mean in that
        setting.
      whatGoodLooksLike: >-
        A good answer keeps the sign readings straight in your new aisle:
        positive still means aligned, zero still means unrelated, negative
        still means opposed, just translated into words that fit whatever
        you picked.
  papers:
    - title: Attention Is All You Need
      url: https://arxiv.org/abs/1706.03762
      hook: >-
        Next session's machine: you'll see tonight's meter in its work
        uniform, a dot product divided by sqrt(d_k) (the square root of the
        key dimension, a size correction) then softmaxed (squashed into
        weights that sum to one), scoring every word in a sentence against
        every other word. Read section 3.2.1 tonight if you want the
        preview before the next session opens with it.
    - title: >-
        Neural Machine Translation by Jointly Learning to Align and
        Translate
      url: https://arxiv.org/abs/1409.0473
      hook: >-
        Before the dot product got the job of scoring alignment, a small
        trained network did it by hand, one learned function per
        comparison. Read this to see the score you built tonight replacing
        that learned function with a much cheaper piece of arithmetic.
    - title: Dot products and duality
      url: https://www.3blue1brown.com/lessons/dot-products
      hook: >-
        The sweep you turned by hand tonight, projection times length,
        sign flipping as the probe crosses perpendicular, gets its full
        moving picture here. Watch it if you want the geometry behind the
        honest look you just took.
  projects:
    - title: Stress-test the length cheat
      brief: >-
        Rebuild tonight's probe-and-candidates setup in NumPy: one probe
        vector and three candidate vectors, each just a short list of
        floats. Write a plain_score(probe, candidate) function that
        returns the raw dot product, and confirm you can reproduce the
        length cheat by stretching one candidate until it overtakes a
        better-aligned rival. Then write your own fixed_score function
        that applies the cheapest fix you can think of, and prove in code
        that stretching a candidate's length no longer changes who wins.
        Finish line: a printed table of raw vs. fixed scores across at
        least three length settings, showing the ranking holding steady
        under your fix while it still visibly flips under the raw score.
    - title: Score your own aisle
      brief: >-
        Pick ten short things you actually care about comparing, songs,
        job posts, anything you can turn into a handful of numeric
        features, and hand-build feature vectors for a probe and every
        candidate. Compute the plain dot-product score for each candidate,
        print them ranked high to low, and read down the list against your
        own gut feeling. Finish line: a ranked printout plus one sentence
        naming a spot where the raw score's blindness to length pushed a
        candidate higher than your gut says it deserved, the same blind
        spot the amber probe showed you tonight.
