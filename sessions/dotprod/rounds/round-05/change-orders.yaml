      rule: Before any prediction that depends on a computation, state the full worked calculation with
        real numbers the learner can check by hand; never let an abstract recipe carry a prediction
        alone.
      rationale: A prediction the learner cannot verify by hand tests faith, not understanding; the worked
        numbers give the prediction something concrete to be right or wrong about.
