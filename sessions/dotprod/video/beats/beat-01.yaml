beat:
  id: beat-01
  title: The score behind the song
  narration: >-
    Say your music app plays you a song you love, by a band you have never heard
    of. Two descriptions get compared in a data center and the verdict comes
    back: same taste. But weigh what that comparison has to do. A song is not
    one number. It is loud, fast, sad, bright, many qualities at once, and your
    taste is that same tangle.


    No single ruler works here, because the ruler that measures loud says
    nothing about sad. And waiting for two tangles to agree on every quality at
    once is a lottery you would never win, so the comparison needs a principled
    way to collapse many measurements into one.


    So try it first. How would you boil the match between two many-featured
    things down to a single number? Harder than it sounds. One answer to it runs
    half of modern machine learning.
  visual: "[visual: connect-to-reality] Two tall stacks of qualities slide in side
    by side, one for the listener's taste and one for the song, each row a named
    feature in periwinkle: loud, fast, sad, bright, and more trailing off the
    frame. A short cream ruler lays against one row at a time and never spans
    the stack, and a run of exact-match ticks flickers out as rows refuse to
    agree. A single lilac match readout waits with a question mark where its
    number should be. The question card holds over the unfilled readout, half
    the frame deliberately empty so the puzzle, not an answer, owns the screen."
