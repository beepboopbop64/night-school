beat:
  id: beat-04
  title: What the meter gets wrong
  narration: >-
    Time to close the loop. Rebuild the meter from memory: two arrows go in, so
    what two operations turn them into the score?


    While you think, one detour worth naming. Swap the songs for a job posting.
    Score yourself against what the role wants: multiply the matched entries,
    add them up, one number for the fit. Different aisle, same meter. The
    multiply-and-add never asked what the numbers meant, and that is exactly why
    it travels.


    Now the honest look. Stretch a candidate longer and its score climbs, even
    though its direction never moved. Long songs would win on sheer loudness,
    and padded resumes would win on sheer length.


    For the walk home: what is the cheapest fix that keeps the direction and
    forgets the size? Still up? The menu below has three ways to keep going.
  visual: '[visual: dynamic-process | connect-to-reality] The retrieval prompt
    holds as a card while the meter idles. The song columns swap for two labeled
    "you" and "the role": Python hours, SQL reps, nights free; matched entries
    multiply and pool into the same lilac readout on the same dial. Then one
    periwinkle candidate stretches longer; its lilac score climbs while its
    direction holds still; a small rose flag marks the unearned win. The
    walk-home question lands as the closing card, and a quiet chip points to the
    extensions menu on the page.'
