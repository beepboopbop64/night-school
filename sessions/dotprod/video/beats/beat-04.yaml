  title: What the meter gets wrong
  narration: >-
    Time to close the loop. Rebuild the meter from memory: two arrows go in, so
    what two operations turn them into the score?


    While you think, one more honest look. Stretch a candidate longer and its
    score climbs, even though its direction never moved. Long songs would win on
    sheer loudness.


    For the walk home: what is the cheapest fix that keeps the direction and
    forgets the size? Still up? The menu below has three ways to keep going.
