  title: Back to the data center
  narration: >-
    Time to close the loop. Rebuild the meter from memory: two arrows go in, and
    which two operations turn them into a single score?


    Hold your answer while the opening scene comes back. Your app played you a
    stranger's song and called it your taste. You know what that took now. Your
    taste is the probe. The catalog is a shelf of candidates, thousands of
    arrows long. And the machine in the data center is the thing you just built,
    running multiply-and-add a few million times and handing you the top bar.
    That was the whole mystery: your meter, at scale.
  visual: "[visual: connect | connect-to-reality] The retrieval card holds the
    compressed question while the meter idles. Then the hook's frame returns:
    the two tall stacks from beat-01 stand beside the arrows they folded into,
    the amber probe takes the label 'your taste', and the candidate row extends
    into a long periwinkle catalog shelf running off frame, arrows all the way
    down. Score bars rank themselves under the shelf, the top bar slides forward
    as the played song, and the data center readout from the opening fills its
    question mark with the winning score."
