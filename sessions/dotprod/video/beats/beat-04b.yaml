  title: The honest look
  narration: >-
    Now the honest look, and guess before you watch. Double c1's length exactly,
    leave its direction untouched, does the number double too?


    It does, exactly. Double one input, double the output: the meter is linear
    in each arrow you feed it. That clean scaling is the crack. Long songs would
    win on sheer loudness, and padded resumes would win on sheer length, because
    size passes straight through.


    For the walk home: what is the cheapest fix that keeps the direction and
    forgets the size, now that you know size scales the score in lockstep? Still
    up? The menu below has three ways to keep going.
