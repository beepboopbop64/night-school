# S1 sources for session "attention". Every load-bearing dossier claim maps
# to a resolving URL. checked = date the URL was fetched and the claim read
# against the source by the Researcher.
schemaVersion: 1
session: attention
entries:
  - claim: >-
      Sutskever, Vinyals, Le, "Sequence to Sequence Learning with Neural
      Networks": arXiv v1 Sep 10, 2014; maps a variable-length sentence to a
      fixed-dimensional vector; abstract reports 34.8 BLEU (ensemble) vs 33.3
      phrase-based SMT baseline and 36.5 reranking on WMT'14 En-Fr; abstract
      states reversing source (not target) sentences "improved the LSTM's
      performance markedly."
    url: https://arxiv.org/abs/1409.3215
    checked: 2026-07-04
    note: NIPS 2014 paper; venue not stated on the abs page but standard.
  - claim: >-
      Exact reversal numbers, single LSTM, WMT'14 En-Fr: "the LSTM's test
      perplexity dropped from 5.8 to 4.7, and the test BLEU scores of its
      decoded translations increased from 25.9 to 30.6"; the deep LSTM "uses
      8000 real numbers to represent a sentence."
    url: https://ar5iv.labs.arxiv.org/html/1409.3215
    checked: 2026-07-04
    note: Quotes verbatim from the paper body via ar5iv rendering.
  - claim: >-
      Cho, van Merrienboer, Bahdanau, Bengio, "On the Properties of Neural
      Machine Translation": arXiv v1 Sep 3, 2014, SSST-8 workshop; NMT
      "performs relatively well on short sentences without unknown words, but
      its performance degrades rapidly as the length of the sentence and the
      number of unknown words increase."
    url: https://arxiv.org/abs/1409.1259
    checked: 2026-07-04
    note: The brief's "Cho et al. measured the collapse" paper.
  - claim: >-
      Cho et al. BLEU-vs-length figure caption: "The BLEU scores achieved by
      (a) the RNNenc and (b) the grConv for sentences of a given length";
      also "the fixed-length vector representation does not have enough
      capacity to encode a long sentence with complicated structure and
      meaning."
    url: https://ar5iv.labs.arxiv.org/html/1409.1259
    checked: 2026-07-04
    note: >-
      Figure 4 in the ar5iv rendering; confirm figure number against the
      anthology PDF before quoting a number on screen.
  - claim: >-
      Cho et al., "Learning Phrase Representations using RNN Encoder-Decoder
      for Statistical Machine Translation": arXiv v1 Jun 3, 2014, EMNLP 2014;
      one RNN "encodes a sequence of symbols into a fixed-length vector
      representation"; Bahdanau is a co-author (the project he interned on).
    url: https://arxiv.org/abs/1406.1078
    checked: 2026-07-04
    note: Establishes the encoder-decoder bottleneck Bahdanau worked on.
  - claim: >-
      Bahdanau, Cho, Bengio, "Neural Machine Translation by Jointly Learning
      to Align and Translate": arXiv v1 Mon Sep 1, 2014 (v7 May 2016); ICLR
      2015 oral; abstract conjectures the "fixed-length vector is a
      bottleneck" and proposes letting the model "automatically (soft-)search
      for parts of a source sentence that are relevant to predicting a target
      word."
    url: https://arxiv.org/abs/1409.0473
    checked: 2026-07-04
    note: Submission history quoted on the abs page.
  - claim: >-
      Bahdanau et al. Figure 2 caption: "The BLEU scores of the generated
      translations on the test set with respect to the lengths of the
      sentences"; "the performance of RNNencdec dramatically drops as the
      length of the sentences increases" while "RNNsearch-50, especially,
      shows no performance deterioration even with sentences of length 50 or
      more"; Table 1: RNNencdec-50 17.82 / 26.71, RNNsearch-50 26.75 / 34.16
      (all sentences / no unknown words).
    url: https://ar5iv.labs.arxiv.org/html/1409.0473
    checked: 2026-07-04
    note: Primary redraw artifact for the video.
  - claim: >-
      Bahdanau 2014 scoring is additive, not dot-product: a(s_{i-1}, h_j) =
      v_a^T tanh(W_a s_{i-1} + U_a h_j) (section A.1.2); the paper says
      "Intuitively, this implements a mechanism of attention in the decoder.
      The decoder decides parts of the source sentence to pay attention to."
      (section 3.1).
    url: https://ar5iv.labs.arxiv.org/html/1409.0473
    checked: 2026-07-04
    note: Grounds disclosure 5 and the naming-anecdote wrinkle.
  - claim: >-
      Bahdanau's own origin account: intern in Bengio's lab after the first
      year of his MSc at Jacobs University; about five weeks left in the
      internship; gaze-shifting inspiration; softmax weighted averaging
      worked on the first attempt; he named it RNNSearch; "The better name
      (attention) was only added by Yoshua to the conclusion in one of the
      final passes"; arose independently of NTM / Memory Networks.
    url: https://x.com/karpathy/status/1864023344435380613
    checked: 2026-07-04
    note: >-
      Bahdanau email published by Karpathy Dec 2024 with permission; quotes
      as reproduced in coverage (see next two entries); eyeball the X post
      image before quoting on screen.
  - claim: >-
      Secondary coverage of the Bahdanau account, including Bengio's naming
      motivation and Schmidhuber's contested-priority claim (1992 fast-weight
      programmers); Bahdanau reports no influence from that work.
    url: https://www.turingpost.com/p/attention
    checked: 2026-07-04
    note: Secondary source, Dec 14, 2024; use for orientation, not quotes.
  - claim: >-
      HN discussion pointer to the Karpathy post ("The True Origin of
      Attention, from Its Author Dzmitry Bahdanau").
    url: https://news.ycombinator.com/item?id=42310213
    checked: 2026-07-04
    note: Lead only.
  - claim: >-
      Luong, Pham, Manning, "Effective Approaches to Attention-based Neural
      Machine Translation": arXiv v1 Aug 17, 2015, EMNLP 2015; section 3.1
      defines the score functions dot (h_t^T h_s), general (h_t^T W_a h_s),
      and concat (v_a^T tanh(W_a [h_t; h_s])).
    url: https://ar5iv.labs.arxiv.org/html/1508.04025
    checked: 2026-07-04
    note: Dot-product attention scoring predates Vaswani; abs page at arxiv.org/abs/1508.04025.
  - claim: >-
      Vaswani et al., "Attention Is All You Need": arXiv v1 Jun 12, 2017;
      "An attention function can be described as mapping a query and a set of
      key-value pairs to an output, where the query, keys, values, and output
      are all vectors"; Attention(Q,K,V) = softmax(QK^T / sqrt(d_k))V;
      footnote: components of q and k "independent random variables with mean
      0 and variance 1. Then their dot product ... has mean 0 and variance
      d_k"; "for large values of d_k, the dot products grow large in
      magnitude, pushing the softmax function into regions where it has
      extremely small gradients"; base model d_model = 512, d_k = 64, h = 8;
      28.4 BLEU En-De, 41.8 BLEU En-Fr.
    url: https://ar5iv.labs.arxiv.org/html/1706.03762
    checked: 2026-07-04
    note: Abs page with submission history at arxiv.org/abs/1706.03762.
  - claim: >-
      "Attention Is All You Need" venue: Advances in Neural Information
      Processing Systems 30 (NIPS 2017).
    url: https://proceedings.neurips.cc/paper/2017/hash/3f5ee243547dee91fbd053c1c4a845aa-Abstract.html
    checked: 2026-07-04
    note: Official proceedings page.
  - claim: >-
      Wu et al., "Google's Neural Machine Translation System": arXiv v1 Sep
      26, 2016; 8 encoder + 8 decoder LSTM layers "using attention and
      residual connections"; "reduces translation errors by an average of 60%
      compared to Google's phrase-based production system."
    url: https://arxiv.org/abs/1609.08144
    checked: 2026-07-04
    note: The GNMT system paper (31 authors).
  - claim: >-
      GNMT production launch: Google Research blog, Sep 27, 2016 (Le and
