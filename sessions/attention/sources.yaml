  - claim: >-
      Jain and Wallace, "Attention is not Explanation": NAACL 2019, pages
      3543-3556; "learned attention weights are frequently uncorrelated with
      gradient-based measures of feature importance" and one "can identify
      very different attention distributions that nonetheless yield
      equivalent predictions."
    url: https://aclanthology.org/N19-1357/
    checked: 2026-07-04
    note: arXiv v1 Feb 26, 2019 at arxiv.org/abs/1902.10186.
  - claim: >-
      Jain and Wallace scope, verbatim from the paper body: the relationship
      "is not obvious, at least for RNN encoders"; "we have limited our
      evaluation to tasks with unstructured output spaces, i.e., we have not
      considered seq2seq tasks"; "one cannot conclude that the model made a
      particular prediction because it attended over inputs in a specific
      way"; BiLSTM encoders; datasets SST, IMDB, ADR Tweets, 20 Newsgroups,
      AG News, Diabetes and Anemia (MIMIC), CNN QA, bAbI 1/2/3, SNLI.
    url: https://aclanthology.org/N19-1357.pdf
    checked: 2026-07-04
    note: Quotes extracted from the published PDF (sections 3 and 7).
  - claim: >-
      Wiegreffe and Pinter, "Attention is not not Explanation": EMNLP 2019,
      arXiv v1 Aug 13, 2019; "even when reliable adversarial distributions
      can be found, they don't perform well on the simple diagnostic,
      indicating that prior work does not disprove the usefulness of
      attention mechanisms for explainability"; proposes uniform-weights
      baseline, seed-variance calibration, frozen-weights diagnostic, and
      end-to-end adversarial training tests.
    url: https://arxiv.org/abs/1908.04626
    checked: 2026-07-04
    note: The rebuttal's actual counterclaim, per the brief's S1 flag.
  - claim: >-
      Serrano and Smith, "Is Attention Interpretable?": ACL 2019, arXiv v1
      Jun 9, 2019; attention weights only noisily predict the overall
