      ranking (paraphrase of abstract).
    url: https://arxiv.org/abs/1906.03731
    checked: 2026-07-04
    note: Belongs in the account per the brief's question; paraphrase, not quote.
  - claim: >-
      Bibal et al., "Is Attention Explanation? An Introduction to the
