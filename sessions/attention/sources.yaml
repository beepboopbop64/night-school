    url: https://blog.google/products/translate/found-translation-more-accurate-fluent-sentences-google-translate/
    checked: 2026-07-04
    note: Second half of the deployment story.
  - claim: >-
      Google Translate scale in 2016: "more than 500 million of you using
      Google Translate" and "we translate more than 100 billion words a day"
      (Turovsky, Apr 28, 2016).
    url: https://blog.google/products/translate/ten-years-of-google-translate/
    checked: 2026-07-04
    note: >-
      This CORRECTS the brief's "billion users" stakes line, which failed
